name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          check-latest: true
          cache: false # zero-dependency module: there is no go.sum to cache

      - name: gofmt
        run: test -z "$(gofmt -s -l .)" || (gofmt -s -d . && exit 1)

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@v0.7.0 ./...

      - name: Build
        run: go build ./...

      - name: Test (race + coverage)
        run: go test -race -cover ./...

  # Fuzz smoke moved to the local pre-push hook (.githooks/pre-push), scoped to
  # the packages each push changes: the local run reuses the persistent fuzz
  # corpus in the build cache (CI always restarted from seeds) and retires the
  # fuzz engine's spurious context-deadline failures on loaded runners.

  interop:
    # Read the library's generated output back with independent third-party
    # parsers (pymarc, rdflib, bibtexparser, rispy) to catch interop regressions.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          check-latest: true
          cache: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install reference parsers
        run: pip install pymarc rdflib bibtexparser rispy
      - name: Interop and differential tests
        run: go test -run 'TestInterop|TestDifferential' -v .
