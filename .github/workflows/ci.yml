name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true

      - name: gofmt
        run: test -z "$(gofmt -s -l .)" || (gofmt -s -d . && exit 1)

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (race + coverage)
        run: go test -race -cover ./...

  fuzz-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true

      - name: Fuzz smoke (every target, all packages)
        shell: bash
        run: |
          set -uo pipefail
          rc=0
          # Discover every Fuzz* target across the module and exercise each one
          # briefly, so new formats are covered without editing this list.
          for f in $(grep -rlE '^func Fuzz' --include='*_test.go' .); do
            dir=$(dirname "$f")
            pkg="./${dir#./}" # force a relative path so it is not read as an import path
            for fn in $(grep -oE '^func Fuzz[A-Za-z0-9_]+' "$f" | awk '{print $2}'); do
              echo "== fuzz $pkg $fn =="
              go test "$pkg" -run='^$' -fuzz="^${fn}\$" -fuzztime=15s || rc=1
            done
          done
          exit $rc
