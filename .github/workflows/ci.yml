name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true

      - name: gofmt
        run: test -z "$(gofmt -s -l .)" || (gofmt -s -d . && exit 1)

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (race + coverage)
        run: go test -race -cover ./...

  fuzz-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true

      - name: Fuzz smoke (each format)
        run: |
          for pkg in iso2709 marcxml marcjson mrk; do
            echo "== fuzzing $pkg =="
            go test ./$pkg/ -run='^$' -fuzz=FuzzDecode -fuzztime=20s
          done
