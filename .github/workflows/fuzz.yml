name: Nightly fuzz

# Deep fuzzing that accumulates coverage across runs: the generated fuzz corpus
# is cached and restored so each night builds on the last, reaching depths the
# per-push 15s smoke (in ci.yml) cannot. Runs every target for a few minutes and
# uploads any failing input it discovers.

on:
  schedule:
    - cron: '0 4 * * *' # daily, 04:00 UTC
  workflow_dispatch:
    inputs:
      fuzztime:
        description: 'Per-target fuzz duration'
        default: '3m'

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          check-latest: true
          cache: false

      # Roll the generated corpus forward: restore the most recent prior cache,
      # save a fresh one each run (the unique key never hits, so it always saves).
      - name: Restore fuzz corpus
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build/fuzz
          key: fuzz-corpus-${{ github.run_id }}
          restore-keys: fuzz-corpus-

      - name: Deep fuzz (every target)
        shell: bash
        env:
          FUZZTIME: ${{ github.event.inputs.fuzztime || '3m' }}
        run: |
          set -uo pipefail
          rc=0
          for f in $(grep -rlE '^func Fuzz' --include='*_test.go' .); do
            dir=$(dirname "$f")
            pkg="./${dir#./}"
            for fn in $(grep -oE '^func Fuzz[A-Za-z0-9_]+' "$f" | awk '{print $2}'); do
              echo "== fuzz $pkg $fn (${FUZZTIME}) =="
              go test "$pkg" -run='^$' -fuzz="^${fn}\$" -fuzztime="$FUZZTIME" || rc=1
            done
          done
          exit $rc

      - name: Upload discovered crashers
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashers
          path: '**/testdata/fuzz/**'
          if-no-files-found: ignore
